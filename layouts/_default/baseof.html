<!doctype html>
<html lang="{{ .Language.Lang }}" dir="{{ .Language.LanguageDirection | default "auto" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="site-body kind-{{ .Kind }} section-{{ .Section | default "home" }} lang-{{ .Language.Lang }}" id="top">
  <a class="skip-link" href="#content">{{ if eq .Language.Lang "zh" }}跳到正文{{ else }}Skip to content{{ end }}</a>
  {{ partial "header.html" . }}
  <main class="main" id="content" tabindex="-1">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
