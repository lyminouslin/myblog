baseURL = "https://kevinylin.org/"
title = "Kevin Y. Lin"
theme = "PaperMod"

defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true
disableHugoGeneratorInject = true
disableKinds = ["taxonomy", "term", "RSS"]

[outputs]
  home = ["HTML"]

[pagination]
  pagerSize = 8

[minify]
  disableXML = true
  minifyOutput = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.146.0"

[languages]
  [languages.en]
    languageName = "English"
    languageAltTitle = "English"
    contentDir = "content/en"
    weight = 1
    title = "Kevin Y. Lin"

    [[languages.en.menu.main]]
      name = "Articles"
      url = "posts/"
      weight = 1

    [[languages.en.menu.main]]
      name = "About me"
      url = "about/"
      weight = 2

  [languages.zh]
    languageName = "中文"
    languageAltTitle = "中文"
    contentDir = "content/zh"
    weight = 2
    title = "Kevin Y. Lin"

    [[languages.zh.menu.main]]
      name = "文章"
      url = "posts/"
      weight = 1

    [[languages.zh.menu.main]]
      name = "关于我"
      url = "about/"
      weight = 2

[params]
  title = "Kevin Y. Lin"
  description = "Articles, notes, and occasional self-aware drivel."
  keywords = ["Kevin Y. Lin", "articles", "notes"]
  author = "Kevin Y. Lin"
  env = "production"
  defaultTheme = "light"
  DateFormat = "Jan 2, 2006"
  mainSections = ["posts"]

  math = false
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = false
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  UseHugoToc = false
  ShowToc = false
  comments = false
  hideFooter = false
  disableThemeToggle = true
  disableScrollToTop = true
  displayFullLangName = false

  [params.label]
    text = "Kevin Y. Lin"

  [params.assets]
    theme_color = "#f7f7f4"
    msapplication_TileColor = "#f7f7f4"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/lyminouslin"

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/crypto_lunaii"

  [[params.socialIcons]]
    name = "stackexchange"
    url = "https://math.stackexchange.com/users/1642272/kevin-lin"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = true
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "github"
