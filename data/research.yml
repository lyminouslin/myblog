profile:
  name: "Kevin Y. Lin"
  image: "/images/kevin.jpg"
  role:
    en: "Undergraduate in Physics at SUSTech, Class of 2028"
    zh: "南方科技大学物理系本科生，2028 届"
  homeKicker:
    en: "Physics notebook / quantum materials / topology"
    zh: "物理笔记 / 量子材料 / 拓扑"
  statement:
    en: "I study quantum materials through electronic structure, topology, and careful mathematical notes."
    zh: "我用电子结构、拓扑和严谨的数学笔记理解量子材料。"
  longStatement:
    en: "This site is built as a working laboratory: a place to turn papers, calculations, spectra, and half-formed questions into durable notes."
    zh: "这个网站被设计成一个在线工作台：把论文、推导、谱学线索和正在形成的问题沉淀成可继续生长的笔记。"
  identity:
    - en: "SUSTech Physics"
      zh: "南科大物理"
    - en: "Class of 2028"
      zh: "2028 届"
    - en: "Condensed Matter"
      zh: "凝聚态物理"

signals:
  - id: "spectroscopy"
    number: "01"
    label:
      en: "STM / ARPES"
      zh: "STM / ARPES"
    title:
      en: "Local and momentum-space probes"
      zh: "局域与动量空间探针"
    text:
      en: "Scanning tunneling microscopy, spectroscopy, and band mapping as complementary ways to see electronic structure."
      zh: "用扫描隧道显微、谱学和能带图像互相校准电子结构。"
  - id: "topology"
    number: "02"
    label:
      en: "Topology"
      zh: "拓扑"
    title:
      en: "Geometry with consequences"
      zh: "有物理后果的几何"
    text:
      en: "Chern gaps, Berry curvature, boundary states, and the calculations that make topological claims testable."
      zh: "关注 Chern 能隙、Berry 曲率、边界态，以及让拓扑判断可检验的计算。"
  - id: "inference"
    number: "03"
    label:
      en: "Inference"
      zh: "推断"
    title:
      en: "Uncertainty as structure"
      zh: "把不确定性变成结构"
    text:
      en: "Bayesian reasoning, model comparison, and habits for reading noisy experimental evidence without flattening it."
      zh: "用贝叶斯推断、模型比较和概率思维阅读复杂实验信号。"

domains:
  - id: "quantum-materials"
    group: "materials topology spectroscopy"
    label:
      en: "Quantum Materials"
      zh: "量子材料"
    title:
      en: "Where lattice, orbital texture, and symmetry become measurable behavior."
      zh: "晶格、轨道纹理与对称性如何变成可测量的行为。"
    text:
      en: "I track how microscopic structure produces phases that are visible in spectra, transport, and momentum-resolved experiments."
      zh: "追踪微观结构如何在谱学、输运和动量分辨实验中显影为新的相。"
    methods:
      - "STM"
      - "ARPES"
      - "Landau levels"
    status:
      en: "Active"
      zh: "进行中"
  - id: "chern-magnetism"
    group: "materials topology"
    label:
      en: "Chern Magnetism"
      zh: "Chern 磁性"
    title:
      en: "How magnetic order opens topological gaps."
      zh: "磁有序如何打开拓扑能隙。"
    text:
      en: "The working question is how Berry curvature, spin polarization, and band geometry leave signatures in edge states and Hall response."
      zh: "核心问题是 Berry 曲率、自旋极化和能带几何如何在边界态与霍尔响应中留下痕迹。"
    methods:
      - "Berry curvature"
      - "Hall response"
      - "Edge-state mapping"
    status:
      en: "Deep dive"
      zh: "重点深入"
  - id: "manifolds"
    group: "math topology"
    label:
      en: "Manifolds"
      zh: "流形"
    title:
      en: "Clean definitions before clever arguments."
      zh: "先把定义磨干净，再谈漂亮论证。"
    text:
      en: "Topology notes are written to make definitions operational: charts, boundary conditions, transition maps, and examples."
      zh: "拓扑笔记强调定义的可操作性：坐标图、边界条件、转移映射和反例。"
    methods:
      - "Proof sketches"
      - "Counterexamples"
      - "Coordinate charts"
    status:
      en: "Notebook"
      zh: "笔记库"
  - id: "probability"
    group: "inference math"
    label:
      en: "Bayesian Inference"
      zh: "贝叶斯推断"
    title:
      en: "Reasoning when the evidence is incomplete."
      zh: "在证据不完整时保持可更新的判断。"
    text:
      en: "A side track on priors, likelihoods, uncertainty propagation, and model criticism for scientific reasoning."
      zh: "关于先验、似然、不确定性传播和模型批判的长期支线。"
    methods:
      - "Model comparison"
      - "Posterior checks"
      - "Uncertainty propagation"
    status:
      en: "Growing"
      zh: "持续增长"

questions:
  - id: "q1"
    domain: "spectroscopy"
    title:
      en: "When does a spectroscopic peak deserve a topological interpretation?"
      zh: "一个谱峰什么时候才值得被解释为拓扑信号？"
    text:
      en: "I try to separate necessary signatures from persuasive but insufficient correlations."
      zh: "我会区分必要证据与看起来很有说服力但仍不足够的相关性。"
  - id: "q2"
    domain: "topology"
    title:
      en: "Which assumptions make bulk-boundary correspondence experimentally legible?"
      zh: "哪些假设让体边对应在实验中变得可读？"
    text:
      en: "The interesting work is often hidden in disorder, termination, finite-size effects, and probe sensitivity."
      zh: "真正麻烦的地方常藏在无序、边界终止、有限尺寸效应和探针灵敏度里。"
  - id: "q3"
    domain: "math"
    title:
      en: "Can a derivation be written so the next step feels inevitable?"
      zh: "一段推导能否写到让下一步显得几乎必然？"
    text:
      en: "That is the editorial standard for mathematical notes on this site."
      zh: "这是本站数学笔记的写作标准。"

methods:
  - id: "stm"
    group: "spectroscopy materials"
    label:
      en: "STM"
      zh: "STM"
    title:
      en: "Local density of states"
      zh: "局域态密度"
    text:
      en: "Use real-space spectroscopy to connect defects, edges, and local electronic structure."
      zh: "用实空间谱学把缺陷、边界和局域电子结构联系起来。"
  - id: "arpes"
    group: "spectroscopy materials"
    label:
      en: "ARPES"
      zh: "ARPES"
    title:
      en: "Momentum-resolved bands"
      zh: "动量分辨能带"
    text:
      en: "Read dispersions, gaps, and orbital character against theoretical band pictures."
      zh: "把色散、能隙和轨道特征放回理论能带图像中阅读。"
  - id: "landau"
    group: "spectroscopy topology"
    label:
      en: "Landau fan"
      zh: "Landau 扇图"
    title:
      en: "Quantization as a ruler"
      zh: "把量子化当作尺子"
    text:
      en: "Use field-dependent levels to infer Dirac velocity, gap size, and spin response."
      zh: "利用随磁场变化的能级推断 Dirac 速度、能隙大小和自旋响应。"
  - id: "proof"
    group: "math topology"
    label:
      en: "Derivation"
      zh: "推导"
    title:
      en: "Definitions under stress"
      zh: "压力测试定义"
    text:
      en: "Push definitions through examples until hidden assumptions become visible."
      zh: "把定义推进到例子和反例里，让隐藏假设浮现出来。"

timeline:
  - date: "2025"
    title:
      en: "Built the public notebook"
      zh: "建立公开笔记系统"
    text:
      en: "Started organizing paper summaries, topology derivations, and research questions into a multilingual Hugo site."
      zh: "开始把论文总结、拓扑推导和研究问题整理成多语言 Hugo 站点。"
  - date: "2026"
    title:
      en: "Research map and interactive archive"
      zh: "研究地图与交互档案"
    text:
      en: "Expanded the site from a simple blog into a navigable research workspace with filters, command palette, and structured pages."
      zh: "把站点从简单博客扩展为可导航的研究工作台，包含过滤器、命令面板和结构化页面。"
  - date: "Next"
    title:
      en: "More experimental reading notes"
      zh: "更多实验读书笔记"
    text:
      en: "Add comparative notes across kagome materials, Chern systems, and spectroscopic methods."
      zh: "继续增加 kagome 材料、Chern 体系和谱学方法之间的比较笔记。"

current:
  focus:
    - en: "Quantum-limit Chern magnetism"
      zh: "量子极限 Chern 拓扑磁性"
    - en: "Manifolds and boundary definitions"
      zh: "流形与边界定义"
    - en: "Spectroscopic evidence chains"
      zh: "谱学证据链"
  stack:
    - "STM"
    - "ARPES"
    - "Dirac fermions"
    - "Chern gaps"
    - "Manifolds"
    - "Bayesian inference"
  principles:
    - en: "Make every claim traceable to either a definition, a measurement, or a model assumption."
      zh: "让每个判断都能追溯到定义、测量或模型假设。"
    - en: "Prefer compact derivations over compressed conclusions."
      zh: "偏好紧凑推导，而不是被压缩过的结论。"
    - en: "Use design to make hard material more navigable, not louder."
      zh: "用设计让困难内容更容易导航，而不是更吵。"
